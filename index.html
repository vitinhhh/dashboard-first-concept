<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body> 

        <div class="app">

            <aside class="sidebar" id="sidebar">

                <div class="sidebar-header">

              
                   <a href="/" class="logo">
                     <img src="logo.svg" alt="main-logo">
                  </a>
                

                  <div class="header-panel">
                      <button class="sidebar-trigger" id="sidebar-trigger">
                          <i data-lucide="panel-right" class="icon-default"></i>
                       </button>
                    </div>

                </div>

                <hr>

                <div class="menu-section">
                    <button class="menu-section-toggle">Account
                            <i data-lucide="chevron-down" class="menu-toggle-icon"></i>
                    </button>
                 </div>

                    <nav class="sidebar-nav user-nav">
                        <ul class="sidebar-menu">
                            <li>
                                <a href="#" data-page="profile">
                                    <i data-lucide="user-round" class="menu-icon"></i>
                                    <span class="label-text">Profile</span> 
                                </a>
                            </li>

                            <li>
                        
                                 <a href="javascript:void(0)"  id="openSettingsBtn" class="openSettings">
                                    <i data-lucide="settings" class="menu-icon"></i>
                                    <span class="label-text">Settings</span>
                                  </a>

                           </li>     
                        </ul>
                    </nav>

                 <hr>
                    
                 <div class="menu-section">
                    <button class="menu-section-toggle">Workspace
                            <i data-lucide="chevron-down" class="menu-toggle-icon"></i>
                    </button>
                 </div>

                    <nav class="sidebar-nav project-nav">
                        <ul class="sidebar-menu">
                            <li>
                                <a href="#" data-page="projects">
                                    <i data-lucide="folder-open-dot" class="menu-icon"></i>
                                    <span class="label-text">Project</span> 
                                </a>
                            </li>

                            <li>
                                <a href="#" data-page="notes">
                                    <i data-lucide="pencil-line" class="menu-icon"></i>
                                    <span class="label-text">Notes</span> 
                                </a>
                            </li>

                            <li>
                                <a href="#" data-page="tasks">
                                    <i data-lucide="clipboard-pen" class="menu-icon"></i>
                                    <span class="label-text">Tasks</span> 
                                </a>
                            </li>

                            <li>
                                <a href="#" data-page="calendar">
                                    <i data-lucide="calendar" class="menu-icon"></i>
                                    <span class="label-text">Calendar</span> 
                                </a>
                            </li>
                        </ul>
                    </nav>


                         <div id="settingsModal"class="Modal">
                               <div class="modal-content-main">

                                <aside class="modal-sidebar">
                                    <div class="modal-sidebar-header">
                                        <h2>Settings</h2>
                                    
                                 <nav class="modal.sidebar-nav">
                                    <button class="modal-nav-item">Visual</button>
                                    <button class="modal-nav-item">Notifications</button>
                                    <button class="modal-nav-item">Outro</button>
                                 </nav>
                                </aside>

                                 <section class="modal-body">
                                    <header class="modal-body-header">
                                       <button class="closeSettingsBtn">&times;</button>
                                    </header>
      
                                    <div class="settings-content">
                                      <h3>Theme</h3>
                                       <p>something</p>
                                   </div>
                                 </section>
                             </div>

            </aside>

            <main class="main-content">
                

            </main> 
        </div>

        
     
     <script src="script.js"></script>
     <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
     <script> lucide.createIcons(); </script>
     
</body>
</html>
