<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body> 

        <div class="app">

            <aside class="sidebar">

                <div class="sidebar-header">

                   <a href="/" class="logo">
                     <img src="logo.svg" alt="main-logo">
                  </a>

                  <div class="header-panel">
                       <i data-lucide="panel-right" class="sidebar-toggle"></i>
                    </div>

                </div>

                <hr>

                <div class="menu-section">
                    <button class="menu-section-toggle">Account
                            <i data-lucide="chevron-down" class="menu-toggle-icon"></i>
                    </button>
                 </div>

                    <nav class="sidebar-nav user-nav">
                        <ul class="sidebar-menu">
                            <li><a href="#" data-page="profile"><i data-lucide="user-round" class="menu-icon"></i>Profile</a></li>
                            <li><a href="javascript:void(0)" data-page="settings" onclick="showPage('settings')"><i data-lucide="settings" class="menu-icon"></i>Settings</a></li>
                        </ul>
                    </nav>

                 <hr>

                 <div class="menu-section">
                    <button class="menu-section-toggle">Workspace
                            <i data-lucide="chevron-down" class="menu-toggle-icon"></i>
                    </button>
                 </div>

                    <nav class="sidebar-nav project-nav">
                        <ul class="sidebar-menu">
                            <li><a href="#" data-page="projects"><i data-lucide="folder-open-dot" class="menu-icon"></i>Project</a></li>
                            <li><a href="#" data-page="notes"><i data-lucide="pencil-line" class="menu-icon"></i>Notes</a></li>
                        </ul>
                    </nav>

                     
                  <hr>

                    <div class="menu-section">
                        <button class="menu-section-toggle">Main
                            <i data-lucide="chevron-down" class="menu-toggle-icon"></i>
                        </button>
                    </div>

                    <nav class="sidebar-nav main-nav">
                        <ul class="sidebar-menu">
                            <li><a href="#"><i data-lucide="clipboard-pen" class="menu-icon"></i>Tasks</a></li>
                            <li><a href="#"><i data-lucide="calendar-days" class="menu-icon"></i>Calendar</a></li>
                        </ul>
                    </nav>

            </aside>

            <main class="main-content">
                <div id="settings" class="page">
                     <div class="settings-header">
                        <ul class="settings-nav">
                            <li><a href="#">Account</a></li>
                            <li><a href="#">Privacy</a></li>
                            <li><a href="#">Security</a></li>
                            <li><a href="#">Notifications</a></li>
                        </ul>
                     </div>

                        <div class="settings-main">

                           <div class="settings-main-header">
                              <div class="breadcrumb">
                                  <p>Settings <span class="active-section">// Account</span></p>
                             </div>
                        </div>

                        <hr class="settings-hr">
                    </div>
                </div>
                  
        

            </main> 
        </div>

        
     
     <script src="script.js"></script>
     <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
     <script> lucide.createIcons(); </script>
     
</body>
</html>
